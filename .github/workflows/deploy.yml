name: Deploy Crypto Currency TA

on:
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '**/*.tf'
      - '**/requirements*.txt'

  workflow_dispatch:  # <-- allows manual Terraform-only runs
    inputs:
      run_terraform_only:
        description: "Run Terraform without rebuilding"
        required: false
        default: "false"

jobs:

  build:
    if: github.event_name == 'push'  # <-- only run build on code changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run all Lambda function tests
        env:
          AWS_DEFAULT_REGION: us-east-2
        run: python run_tests.py

      - name: Build Lambda deployment package
        run: python build.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-packages
          path: .package/
          retention-days: 3


  terraform:
    needs: [build]
    runs-on: ubuntu-latest

    # Allow Terraform to run even if build job was skipped
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'push')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts (if available)
        uses: actions/download-artifact@v4
        with:
          name: lambda-packages
          path: .package/
        continue-on-error: true  # <-- allows Terraform-only runs

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-2

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve
